{% extends "base.html" %}

{% block title %}{{ 'Sửa task' if task else 'Task mới' }} | Sakura{% endblock %}

{% block content %}
  <h3 class="mb-3 text-pink">{{ 'Sửa task' if task else 'Thêm task mới' }}</h3>
  <div class="card sakura-card">
    <div class="card-body">
      <form method="post">
        <div class="mb-3">
          <label class="form-label">Tên task</label>
          <input type="text" name="name" class="form-control" value="{{ task.name if task else '' }}" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Bài học</label>
          <select name="unit_id" class="form-select">
            <option value="" {% if not task %}selected{% endif %}>-- Không liên kết --</option>
            {% for unit in units %}
              <option value="{{ unit.id }}" {% if task and task.Unitid == unit.id %}selected{% endif %}>{{ unit.name }}</option>
            {% endfor %}
          </select>
        </div>
        {% if task %}
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="isCompleted" name="is_completed" {% if task.isCompleted %}checked{% endif %}>
          <label class="form-check-label" for="isCompleted">Hoàn thành</label>
        </div>
        {% endif %}
        <button type="submit" class="btn btn-pink">Lưu</button>
        <a href="{{ url_for('admin_mission.detail', mission_id=task.Missionid if task else '') }}" class="btn btn-outline-secondary ms-2">Hủy</a>
      </form>
    </div>
  </div>
{% endblock %}
