{% extends "base.html" %}

{% block title %}Người dùng Online | Sakura{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="text-pink mb-0">🟢 Người dùng Online</h3>
    <span class="badge bg-success fs-6" id="online-count">Đang tải...</span>
</div>

<div id="online-list" class="row g-3">
    <div class="col-12 text-center text-muted py-5">
        <div class="spinner-border text-pink" role="status"></div>
        <p class="mt-2">Đang tải danh sách...</p>
    </div>
</div>

<p class="text-muted small mt-3 text-end" id="last-updated">Chưa cập nhật</p>

<style>
    .online-card {
        background: #fff;
        border-radius: 1rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
        transition: transform 0.2s, box-shadow 0.2s;
        border: none;
        overflow: hidden;
    }

    .online-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
    }

    .status-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #22c55e;
        display: inline-block;
        animation: pulse-green 2s infinite;
        flex-shrink: 0;
    }

    @keyframes pulse-green {
        0% {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.6);
        }

        70% {
            box-shadow: 0 0 0 8px rgba(34, 197, 94, 0);
        }

        100% {
            box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
        }
    }

    .activity-badge {
        font-size: 0.78rem;
        padding: 0.3rem 0.7rem;
        border-radius: 20px;
        background: #f0f7ff;
        color: #3b82f6;
        font-weight: 500;
    }

    .role-badge-admin {
        background: #fff0f6;
        color: #e83e8c;
    }

    .avatar-online {
        width: 52px;
        height: 52px;
        object-fit: cover;
        border-radius: 50%;
        border: 3px solid #22c55e;
    }
</style>

<script>
    function renderOnlineUsers(users) {
        const container = document.getElementById('online-list');
        const countBadge = document.getElementById('online-count');
        const lastUpdated = document.getElementById('last-updated');

        countBadge.textContent = users.length + ' người online';

        if (users.length === 0) {
            container.innerHTML = `
        <div class="col-12">
          <div class="card online-card p-5 text-center text-muted">
            <div style="font-size:3rem;">😴</div>
            <p class="mt-2 mb-0">Không có ai online lúc này</p>
          </div>
        </div>`;
            return;
        }

        container.innerHTML = users.map(u => `
      <div class="col-sm-6 col-lg-4 col-xl-3">
        <div class="card online-card h-100">
          <div class="card-body d-flex align-items-center gap-3">
            <div class="position-relative flex-shrink-0">
              <img src="${u.avatar}" alt="${u.name}" class="avatar-online" />
            </div>
            <div class="flex-grow-1" style="min-width:0;">
              <div class="d-flex align-items-center gap-2 mb-1">
                <span class="status-dot"></span>
                <span class="fw-bold text-dark text-truncate" title="${u.name}">${u.name}</span>
              </div>
              <div class="mb-1">
                <span class="activity-badge ${u.role === 'ADMIN' ? 'role-badge-admin' : ''}">
                  ${u.role === 'ADMIN' ? '👑 Admin' : '👤 User'}
                </span>
              </div>
              <div>
                <span class="activity-badge">${u.activity_label}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    `).join('');

        const now = new Date();
        lastUpdated.textContent = 'Cập nhật lần cuối: ' + now.toLocaleTimeString('vi-VN');
    }

    function fetchOnlineUsers() {
        fetch('/online/users', { credentials: 'same-origin' })
            .then(r => r.json())
            .then(data => renderOnlineUsers(data.users))
            .catch(() => {
                document.getElementById('online-list').innerHTML =
                    '<div class="col-12"><div class="alert alert-warning">Không thể tải danh sách online.</div></div>';
            });
    }

    // Tải ngay
    fetchOnlineUsers();
    // Tự động làm mới mỗi 15 giây
    setInterval(fetchOnlineUsers, 15000);
</script>
{% endblock %}
