{% extends "base.html" %}

{% block title %}Đăng nhập | Sakura{% endblock %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="card shadow sakura-card">
        <div class="card-body p-4">
          <h2 class="text-center mb-3 text-pink">🌸 Sakura Learning</h2>
          <p class="text-center text-muted mb-4">Đăng nhập để bắt đầu hành trình học tập.</p>
          <form method="post">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Mật khẩu</label>
              <input type="password" name="password" class="form-control" required />
            </div>
            <button type="submit" class="btn btn-pink w-100">Đăng nhập</button>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
