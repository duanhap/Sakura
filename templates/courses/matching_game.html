{% extends "base.html" %}

{% block title %}Game ghép từ: {{ course.name }} | Sakura{% endblock %}

{% block content %}
<style>
    .game-container {
        max-width: 1000px;
        margin: 0 auto;
    }

    .matching-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-top: 30px;
    }

    @media (max-width: 768px) {
        .matching-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    .match-card {
        height: 120px;
        background: white;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        border: 2px solid #eee;
        user-select: none;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        font-weight: 500;
        overflow: hidden;
    }

    .match-card:hover {
        transform: translateY(-5px);
        border-color: #ffc1e3;
        box-shadow: 0 8px 15px rgba(255, 192, 203, 0.2);
    }

    .match-card.selected {
        background: #fff0f6;
        border-color: #e83e8c;
        transform: scale(1.05);
    }

    .match-card.matched {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transform: scale(0.8);
    }

    .match-card.error {
        background: #fff5f5;
        border-color: #ff4d4f;
        animation: shake 0.5s;
    }

    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-5px); }
        75% { transform: translateX(5px); }
    }

    .stats-bar {
        background: white;
        padding: 15px 25px;
        border-radius: 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        margin-bottom: 20px;
    }

    .timer {
        font-family: 'Courier New', Courier, monospace;
        font-size: 1.5rem;
        font-weight: bold;
        color: #e83e8c;
    }

    .win-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(255, 255, 255, 0.9);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        backdrop-filter: blur(5px);
    }

    .win-content {
        text-align: center;
        animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes zoomIn {
        from { opacity: 0; transform: scale(0.5); }
        to { opacity: 1; transform: scale(1); }
    }
</style>

<div class="game-container mb-5">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('course.list') }}">Khóa học</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('course.detail', course_id=course.id) }}">{{ course.name }}</a></li>
            <li class="breadcrumb-item active" aria-current="page">Game ghép từ</li>
        </ol>
    </nav>

    <div class="stats-bar">
        <div>
            <h4 class="mb-0 text-pink fw-bold">🎮 Ghép cặp</h4>
        </div>
        <div class="timer" id="timer">00:00</div>
        <button class="btn btn-outline-pink rounded-pill px-4" onclick="initGame()">Làm mới</button>
    </div>

    <div class="matching-grid" id="gameGrid">
        <!-- Cards injected by JS -->
    </div>
</div>

<div class="win-overlay" id="winOverlay">
    <div class="win-content">
        <h1 style="font-size: 5rem;">🌸</h1>
        <h2 class="text-pink fw-bold mb-3">Tuyệt vời!</h2>
        <p class="fs-4 text-secondary mb-4">Bạn đã hoàn thành trong <span id="finalTime" class="fw-bold text-pink">0s</span>!</p>
        <div class="d-flex gap-3 justify-content-center">
            <button class="btn btn-pink btn-lg px-5 rounded-pill" onclick="initGame()">Chơi lại</button>
            <a href="{{ url_for('course.detail', course_id=course.id) }}" class="btn btn-outline-secondary btn-lg px-5 rounded-pill">Quay lại</a>
        </div>
    </div>
</div>

<script>
    const allFlashcards = {{ flashcards | tojson | safe }};
    let selectedCards = [];
    let matchedPairs = 0;
    let totalPairs = 8;
    let timerInterval;
    let seconds = 0;
    let isGameRunning = false;

    function formatTime(s) {
        const mins = Math.floor(s / 60);
        const secs = s % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function startTimer() {
        if (!isGameRunning) {
            isGameRunning = true;
            seconds = 0;
            document.getElementById('timer').innerText = "00:00";
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').innerText = formatTime(seconds);
            }, 1000);
        }
    }

    function stopTimer() {
        clearInterval(timerInterval);
        isGameRunning = false;
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function initGame() {
        stopTimer();
        document.getElementById('winOverlay').style.display = 'none';
        matchedPairs = 0;
        selectedCards = [];
        
        const grid = document.getElementById('gameGrid');
        grid.innerHTML = '';

        if (allFlashcards.length < 2) {
            grid.innerHTML = '<div class="col-12 text-center text-muted py-5">Cần ít nhất 2 từ vựng để chơi game.</div>';
            return;
        }

        // Pick random cards (max 8 pairs)
        let gamePairs = shuffle([...allFlashcards]).slice(0, Math.min(8, allFlashcards.length));
        totalPairs = gamePairs.length;

        let cards = [];
        gamePairs.forEach(f => {
            // Type 1: Term
            cards.push({ id: f.id, type: 'term', content: f.term });
            // Type 2: Definition (Pronunciation + Description)
            let definition = f.description;
            if (f.pronunciation) definition = `[${f.pronunciation}] ${definition}`;
            cards.push({ id: f.id, type: 'def', content: definition });
        });

        shuffle(cards);

        cards.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = 'match-card';
            cardEl.innerHTML = `<span>${card.content}</span>`;
            cardEl.dataset.id = card.id;
            cardEl.dataset.type = card.type;
            cardEl.onclick = () => handleCardClick(cardEl);
            grid.appendChild(cardEl);
        });

        document.getElementById('timer').innerText = "00:00";
    }

    function handleCardClick(cardEl) {
        if (cardEl.classList.contains('matched') || cardEl.classList.contains('selected')) return;

        startTimer();

        // Already have 2 cards selected? Do nothing until they reset
        if (selectedCards.length === 2) return;

        cardEl.classList.add('selected');
        selectedCards.push(cardEl);

        if (selectedCards.length === 2) {
            checkMatch();
        }
    }

    function checkMatch() {
        const [c1, c2] = selectedCards;
        const isMatch = (c1.dataset.id === c2.dataset.id) && (c1.dataset.type !== c2.dataset.type);

        if (isMatch) {
            setTimeout(() => {
                c1.classList.remove('selected');
                c2.classList.remove('selected');
                c1.classList.add('matched');
                c2.classList.add('matched');
                matchedPairs++;
                selectedCards = [];

                if (matchedPairs === totalPairs) {
                    gameWin();
                }
            }, 400);
        } else {
            setTimeout(() => {
                c1.classList.add('error');
                c2.classList.add('error');
                setTimeout(() => {
                    c1.classList.remove('selected', 'error');
                    c2.classList.remove('selected', 'error');
                    selectedCards = [];
                }, 500);
            }, 400);
        }
    }

    function gameWin() {
        stopTimer();
        document.getElementById('finalTime').innerText = formatTime(seconds);
        document.getElementById('winOverlay').style.display = 'flex';
    }

    initGame();
</script>
{% endblock %}
