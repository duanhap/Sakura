{% extends "base.html" %}

{% block title %}Khóa học | Sakura{% endblock %}

{% block content %}
  <h3 class="mb-3 text-pink">Danh sách khóa học</h3>
  <div class="row g-3">
    {% for course in courses %}
      <div class="col-md-4">
        <div class="card sakura-card h-100">
          {% if course.image %}
            <img src="{{ course.image }}" class="card-img-top course-thumb" alt="course" />
          {% endif %}
          <div class="card-body">
            <h5 class="card-title">{{ course.name }}</h5>
            <p class="card-text small text-muted">{{ course.description }}</p>
            <a href="{{ url_for('course.detail', course_id=course.id) }}" class="btn btn-sm btn-pink">
              Xem chi tiết
            </a>
          </div>
        </div>
      </div>
    {% else %}
      <p class="text-muted">Chưa có khóa học nào.</p>
    {% endfor %}
  </div>
{% endblock %}
